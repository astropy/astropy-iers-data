# This workflow is to run tests on regular pushes and pull requests - it is
# separate from the tests that get run during an auto-update, which can be
# found in update_and_publish.yml

name: Run tests

on:
  push:
  pull_request:

jobs:
  tests:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@6ae6691dfae7f207db7b694e2bbe1c515cf907ab  # v3.0.0
    with:
      envs: |
        - linux: py310-test
        - linux: py311-test
        - linux: py312-test
        - linux: py313-test
        - linux: py314-test-astropydev
        - macos: py310-test
        - macos: py314-test
        - windows: py310-test
        - windows: py314-test
